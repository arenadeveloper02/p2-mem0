version: 1
disable_existing_loggers: false
formatters:
  default:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
handlers:
  console:
    class: logging.StreamHandler
    formatter: default
    stream: ext://sys.stdout
loggers:
  uvicorn:
    level: INFO
    handlers: [console]
  uvicorn.error:
    level: ERROR
    handlers: [console]
  uvicorn.access:
    level: INFO
    handlers: [console]
root:
  level: INFO
  handlers: [console]